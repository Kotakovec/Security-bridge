<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>KotakEngine Terminal v4.2</title>

    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        #viewport {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100dvh;
            position: fixed;
            top: 0;
            left: 0;
        }

        .login-card {
            background: #030303;
            padding: 25px;
            border-radius: 2px;
            border: 1px solid #00ff00;
            text-align: center;
            width: 290px;
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.25);
            position: relative;
        }

        .login-card::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(0, 255, 0, 0.1);
            animation: scan 4s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        /* ANIMACE ZATŘESENÍ */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }

        .apply-shake {
            animation: shake 0.4s ease-in-out;
        }

        h2 { 
            color: #00ff00; 
            margin: 0 0 20px 0;
            font-size: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 5px #00ff00;
        }

        .input-group {
            margin-bottom: 12px;
            text-align: left;
        }

        .input-group label {
            color: #008800;
            font-size: 9px;
            display: block;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 10px;
            background: #000;
            border: 1px solid #004400;
            color: #00ff00;
            border-radius: 0;
            font-size: 14px;
            outline: none;
            font-family: 'Courier New', monospace;
        }

        input:focus {
            border-color: #00ff00;
            box-shadow: 0 0 8px rgba(0, 255, 0, 0.4);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #00ff00;
            border: none;
            color: black;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'Courier New', monospace;
            margin-top: 10px;
            transition: 0.3s ease;
        }

        button:disabled {
            filter: brightness(0.4);
            cursor: not-allowed;
        }

        button:hover:not(:disabled) {
            background: #ffffff;
            box-shadow: 0 0 15px #ffffff;
        }

        #system-msg {
            color: #00ff00;
            font-size: 8px;
            margin-top: 18px;
            letter-spacing: 1px;
            min-height: 10px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div id="viewport">
        <div id="app" class="login-card">
            <h2>KOTAK_ENGINE</h2>

            <div class="input-group">
                <label>User_Identity</label>
                <input type="text" id="u" placeholder="> username" spellcheck="false" autocomplete="off">
            </div>

            <div class="input-group">
                <label>Access_Key</label>
                <input type="password" id="p" placeholder="> password">
            </div>

            <button id="login-btn" onclick="login()">Initialize_Access</button>

            <div id="system-msg"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB0klfrJWi5xNBF3EUkEmVVOE0F8CvjNRw",
            databaseURL: "https://time-897fc-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let decodeInterval;

        const decodeEffect = (customText) => {
            if (decodeInterval) clearInterval(decodeInterval);
            const element = document.getElementById('system-msg');
            const finalDoc = customText || "Secured by KotakEngine File Encryptor";
            const chars = "§$ABCDEF0123456789abcdeklmnorxyz!?@#%&*";
            let solved = "";
            let i = 0;
            element.innerText = "";

            decodeInterval = setInterval(() => {
                let randomChar = chars.charAt(Math.floor(Math.random() * chars.length));
                element.innerText = solved + randomChar;
                if (Math.random() > 0.7) {
                    solved += finalDoc[i] || "";
                    i++;
                }
                if (i >= finalDoc.length) {
                    element.innerText = finalDoc;
                    clearInterval(decodeInterval);
                }
            }, 30);
        };

        window.onload = () => decodeEffect();

        function login() {
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;
            const btn = document.getElementById('login-btn');
            const card = document.querySelector('.login-card');

            // KONTROLA PRÁZDNÝCH POLÍ
            if(!user || !pass) {
                // Přidáme třídu pro zatřesení
                card.classList.add('apply-shake');
                
                // Po skončení animace (0.4s) třídu odebereme, aby se dala spustit znovu
                setTimeout(() => {
                    card.classList.remove('apply-shake');
                }, 400);
                
                return; // Tady končíme, barva ani text se nemění
            }

            // POKUD JE VYPLNĚNO - STANDARDNÍ LOGIKA
            const originalBtnText = btn.innerText;
            btn.innerText = "INITIALIZING . . .";
            btn.disabled = true;

            decodeEffect("ESTABLISHING ENCRYPTED LINK . . .");

            db.ref('users/' + user).once('value').then(s => {
                if(s.exists() && s.val().pass === pass) {
                    document.getElementById('viewport').innerHTML = s.val().html;
                } else {
                    alert("ACCESS DENIED");
                    btn.innerText = originalBtnText;
                    btn.disabled = false;
                    decodeEffect("Secured by KotakEngine File Encryptor");
                }
            }).catch(err => {
                btn.innerText = originalBtnText;
                btn.disabled = false;
                decodeEffect("CONNECTION ERROR");
            });
        }
    </script>
</body>
</html>
