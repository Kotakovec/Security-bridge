<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KotakEngine Mobile Login</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database-compat.js"></script>
    <style>
        body { 
            background: #0b0b0b; color: white; font-family: sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px;
        }
        .card { 
            background: #151515; padding: 25px; border-radius: 12px; 
            border: 1px solid #333; text-align: center; 
            width: 100%; max-width: 350px; /* Na mobilu se zúží */
        }
        input { 
            width: 100%; padding: 15px; margin: 10px 0; 
            background: #222; border: 1px solid #444; color: white; 
            border-radius: 8px; font-size: 16px; /* Velikost 16px zabrání zoomování na iPhone */
            box-sizing: border-box;
        }
        button { 
            width: 100%; padding: 15px; background: #007bff; 
            border: none; color: white; border-radius: 8px; 
            cursor: pointer; font-weight: bold; font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="card">
            <h2 style="color:#0084ff">KotakEngine</h2>
            <input type="text" id="u" placeholder="Uživatel">
            <input type="password" id="p" placeholder="Heslo">
            <button onclick="login()">VSTOUPIT</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB0klfrJWi5xNBF3EUkEmVVOE0F8CvjNRw",
            databaseURL: "https://time-897fc-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function login() {
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;
            db.ref('users/' + user).once('value').then(s => {
                if(s.exists() && s.val().pass === pass) {
                    document.body.innerHTML = s.val().html;
                    document.body.style.background = "black";
                    document.body.style.display = "block";
                } else { alert("Chyba!"); }
            });
        }
    </script>
</body>
</html>
