<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>KotakEngine Secure Login</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database-compat.js"></script>
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #151515; padding: 30px; border-radius: 12px; border: 1px solid #333; text-align: center; width: 320px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 6px; }
        button { width: 100%; padding: 12px; background: #007bff; border: none; color: white; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div id="app">
        <div class="card">
            <h2>KotakEngine</h2>
            <input type="text" id="u" placeholder="Uživatel">
            <input type="password" id="p" placeholder="Heslo">
            <button onclick="login()">Vstoupit</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB0klfrJWi5xNBF3EUkEmVVOE0F8CvjNRw",
            authDomain: "time-897fc.firebaseapp.com",
            databaseURL: "https://time-897fc-default-rtdb.firebaseio.com",
            projectId: "time-897fc",
            storageBucket: "time-897fc.firebasestorage.app",
            messagingSenderId: "420987750968",
            appId: "1:420987750968:web:240c4462bad41137f6b4cd"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function login() {
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;

            db.ref('users/' + user).once('value').then(s => {
                if(s.exists() && s.val().pass === pass) {
                    document.body.innerHTML = s.val().html;
                    document.body.style.background = "white"; // Reset pozadí pro tvůj web
                } else { alert("Chyba!"); }
            });
        }
    </script>
</body>
</html>
