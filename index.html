<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>KotakEngine Terminal v6.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #00ff00; }
        #viewport { display: flex; justify-content: center; align-items: center; width: 100vw; height: 100dvh; position: fixed; top: 0; left: 0; }

        /* LOGIN CARD */
        .login-card { background: #030303; padding: 25px; border-radius: 2px; border: 1px solid #00ff00; text-align: center; width: 290px; box-shadow: 0 0 20px rgba(0, 255, 0, 0.2); position: relative; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-8px); } 40%, 80% { transform: translateX(8px); } }
        .apply-shake { animation: shake 0.3s ease-in-out; }
        h2 { font-size: 16px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; color: #00ff00; }
        .input-group { margin-bottom: 12px; text-align: left; }
        .input-group label { color: #008800; font-size: 9px; display: block; margin-bottom: 4px; text-transform: uppercase; }
        input { width: 100%; padding: 10px; background: #000; border: 1px solid #004400; color: #00ff00; font-size: 14px; outline: none; font-family: 'Courier New', monospace; }
        button { width: 100%; padding: 12px; background: #00ff00; border: none; color: black; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; font-family: 'Courier New', monospace; }
        button:disabled { filter: brightness(0.3); cursor: not-allowed; }

        /* ADMIN PANEL */
        .admin-panel { width: 95%; max-width: 600px; height: 90%; background: #050505; border: 1px solid #00ff00; padding: 15px; display: flex; flex-direction: column; box-shadow: 0 0 30px rgba(0, 255, 0, 0.1); }
        .toolbar { display: flex; gap: 8px; margin-bottom: 15px; }
        .user-list-header { display: grid; grid-template-columns: 1.5fr 1.5fr 0.8fr; gap: 5px; padding: 10px; color: #008800; font-size: 10px; border-bottom: 1px solid #004400; text-transform: uppercase; }
        .user-row { display: grid; grid-template-columns: 1.5fr 1.5fr 0.8fr; gap: 5px; padding: 12px 10px; border-bottom: 1px solid #002200; align-items: center; }
        .btn-small { padding: 8px; font-size: 10px; cursor: pointer; border: 1px solid #00ff00; background: transparent; color: #00ff00; text-transform: uppercase; width: auto; margin: 0; }
        .btn-del { border-color: #ff0000; color: #ff0000; }

        /* MODAL */
        #user-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 200; justify-content: center; align-items: center; }
        #system-msg { color: #00ff00; font-size: 8px; margin-top: 18px; letter-spacing: 1px; opacity: 0.6; }
    </style>
</head>
<body>

<div id="viewport">
    <div id="app" class="login-card">
        <h2>KOTAK_ENGINE</h2>
        <div class="input-group">
            <label>User_Identity</label>
            <input type="text" id="u" placeholder="> username" autocomplete="off" spellcheck="false">
        </div>
        <div class="input-group">
            <label>Access_Key</label>
            <input type="password" id="p" placeholder="> password">
        </div>
        <button id="login-btn" onclick="login()">Initialize_Access</button>
        <div id="system-msg"></div>
    </div>
</div>

<div id="user-modal">
    <div class="login-card" style="width: 310px; border-color: #00ff00;">
        <h2 id="modal-title">USER_SYNC</h2>
        <input type="hidden" id="old-username">
        <div class="input-group">
            <label>ID / USERNAME</label>
            <input type="text" id="new-u" placeholder="username">
        </div>
        <div class="input-group">
            <label>KEY / PASSWORD</label>
            <input type="text" id="new-p" placeholder="password">
        </div>
        <button onclick="commitUser()">SAVE_CHANGES</button>
        <button onclick="closeUserModal()" style="background:transparent; color:#555; border:none; margin-top:5px; font-size: 10px;">CANCEL</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB0klfrJWi5xNBF3EUkEmVVOE0F8CvjNRw",
        databaseURL: "https://time-897fc-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let decodeInterval;
    const decodeEffect = (text) => {
        if (decodeInterval) clearInterval(decodeInterval);
        const el = document.getElementById('system-msg');
        if (!el) return;
        const target = text || "Secured by KotakEngine File Encryptor";
        const chars = "§$ABCDEF0123456789abcdeklmnorxyz!?@#%&*";
        let solved = "";
        let i = 0;
        decodeInterval = setInterval(() => {
            el.innerText = solved + chars.charAt(Math.floor(Math.random() * chars.length));
            if (Math.random() > 0.7) { solved += target[i] || ""; i++; }
            if (i >= target.length) { el.innerText = target; clearInterval(decodeInterval); }
        }, 30);
    };

    window.onload = () => decodeEffect();

    function login() {
        const user = document.getElementById('u').value;
        const pass = document.getElementById('p').value;
        const btn = document.getElementById('login-btn');
        const card = document.querySelector('.login-card');

        if(!user || !pass) {
            card.classList.add('apply-shake');
            setTimeout(() => card.classList.remove('apply-shake'), 300);
            return;
        }

        // ADMIN LOGIN
        if(user === "admin" && pass === "admin987") {
            loadAdmin();
            return;
        }

        btn.disabled = true;
        btn.innerText = "INITIALIZING . . .";
        decodeEffect("ESTABLISHING ENCRYPTED LINK . . .");

        db.ref('users/' + user).once('value').then(s => {
            if(s.exists() && s.val().pass === pass) {
                document.getElementById('viewport').innerHTML = s.val().html;
            } else {
                alert("ACCESS DENIED");
                btn.disabled = false;
                btn.innerText = "Initialize_Access";
                decodeEffect();
            }
        }).catch(() => {
            btn.disabled = false;
            btn.innerText = "Initialize_Access";
        });
    }

    function loadAdmin() {
        const vp = document.getElementById('viewport');
        vp.innerHTML = `
            <div class="admin-panel">
                <h2 style="font-size: 13px; text-align: left; margin: 0 0 15px 5px;">KOTAK_ENGINE // ADMIN</h2>
                <div class="toolbar">
                    <button onclick="openUserModal()" style="width:auto; padding: 10px 15px; font-size: 10px;">+ NEW_USER</button>
                    <button onclick="location.reload()" style="width:auto; background:#222; color:#fff; font-size: 10px;">LOGOUT</button>
                </div>
                <div class="user-list-header">
                    <span>USER</span><span>PASS</span><span>RM</span>
                </div>
                <div id="user-list" style="overflow-y:auto; flex-grow:1;"></div>
            </div>`;
        
        db.ref('users').on('value', s => {
            const list = document.getElementById('user-list');
            if (!list) return;
            list.innerHTML = "";
            s.forEach(u => {
                list.innerHTML += `
                    <div class="user-row">
                        <span style="font-size: 11px; font-weight: bold; cursor:pointer" onclick="openUserModal('${u.key}', '${u.val().pass}')">${u.key}</span>
                        <span style="font-size: 11px; color:#008800">${u.val().pass}</span>
                        <button class="btn-small btn-del" onclick="deleteUser('${u.key}')">X</button>
                    </div>`;
            });
        });
    }

    function openUserModal(u = '', p = '') {
        document.getElementById('old-username').value = u;
        document.getElementById('new-u').value = u;
        document.getElementById('new-p').value = p;
        document.getElementById('modal-title').innerText = u ? "EDIT_USER" : "NEW_USER";
        document.getElementById('user-modal').style.display = "flex";
    }

    function closeUserModal() { document.getElementById('user-modal').style.display = "none"; }

    async function commitUser() {
        const oldU = document.getElementById('old-username').value;
        const newU = document.getElementById('new-u').value;
        const newP = document.getElementById('new-p').value;
        if(!newU || !newP) return;

        if(oldU && oldU !== newU) {
            const oldSnap = await db.ref('users/' + oldU).once('value');
            const oldData = oldSnap.val();
            await db.ref('users/' + newU).set({...oldData, pass: newP});
            await db.ref('users/' + oldU).remove();
        } else {
            const currentSnap = await db.ref('users/' + newU).once('value');
            const current = currentSnap.val();
            const updates = { pass: newP };
            if(!current || !current.html) updates.html = "<h1>New Identity Ready</h1>";
            await db.ref('users/' + newU).update(updates);
        }
        closeUserModal();
    }

    function deleteUser(user) {
        if(confirm(`DELETE IDENTITY: ${user}?`)) db.ref('users/' + user).remove();
    }
</script>
</body>
</html>
