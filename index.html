<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KotakEngine Login</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database-compat.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .login-card {
            background: #111;
            padding: 20px; /* Zmenšeno ze 30px */
            border-radius: 10px;
            border: 1px solid #222;
            text-align: center;
            width: 85%; /* Trochu užší na displeji */
            max-width: 280px; /* Zmenšeno z 350px */
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        h2 { 
            color: #5ec8ed; 
            font-size: 1.2rem; /* Menší nadpis */
            margin-bottom: 15px; 
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 10px; /* Zmenšeno z 15px */
            margin: 6px 0;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            border-radius: 6px;
            font-size: 14px; /* Menší písmo */
            box-sizing: border-box;
            outline: none;
        }

        input:focus {
            border-color: #2563eb;
        }

        button {
            width: 100%;
            padding: 10px; /* Zmenšeno z 15px */
            margin-top: 12px;
            background: #2563eb;
            border: none;
            color: white;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:active {
            background: #1d4ed8;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>KotakEngine</h2>
        <input type="text" id="u" placeholder="Uživatel" autocomplete="off">
        <input type="password" id="p" placeholder="Heslo">
        <button onclick="login()">VSTOUPIT</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB0klfrJWi5xNBF3EUkEmVVOE0F8CvjNRw",
            databaseURL: "https://time-897fc-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function login() {
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;
            
            if (!user || !pass) return;

            db.ref('users/' + user).once('value').then(s => {
                if(s.exists() && s.val().pass === pass) {
                    document.body.innerHTML = s.val().html;
                    document.body.style.display = "block";
                    document.body.style.background = "white"; 
                } else { 
                    alert("Neplatné údaje"); 
                }
            });
        }
    </script>
</body>
</html>
