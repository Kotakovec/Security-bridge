<!DOCTYPE html>

    <style>
        * { box-sizing: border-box; }
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        #viewport {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100dvh;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* DESIGN KARTY */
        .login-card {
            background: #030303;
            padding: 25px;
            border-radius: 2px;
            border: 1px solid #00ff00;
            text-align: center;
            width: 290px;
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.25);
            position: relative;
        }

        /* Efekt skenování */
        .login-card::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(0, 255, 0, 0.1);
            animation: scan 4s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        h2 { 
            color: #00ff00; 
            margin: 0 0 20px 0;
            font-size: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 5px #00ff00;
        }

        /* DESIGN INPUTŮ UVNITŘ */
        .input-group {
            margin-bottom: 12px;
            text-align: left;
        }

        .input-group label {
            color: #008800;
            font-size: 9px;
            display: block;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 10px;
            background: #000;
            border: 1px solid #004400;
            color: #00ff00;
            border-radius: 0;
            font-size: 13px;
            outline: none;
            font-family: 'Courier New', monospace;
            transition: 0.2s;
        }

        input:focus {
            border-color: #00ff00;
            box-shadow: 0 0 8px rgba(0, 255, 0, 0.4);
        }

        /* DESIGN TLAČÍTKA */
        button {
            width: 100%;
            padding: 12px;
            background: #00ff00;
            border: none;
            color: black;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'Courier New', monospace;
            margin-top: 10px;
            transition: 0.2s;
        }

        button:hover {
            background: #ffffff;
            box-shadow: 0 0 15px #ffffff;
        }

        /* DESIGN SPODNÍHO TEXTU S OBSTRUKCÍ */
        #system-msg {
            color: #004400;
            font-size: 8px;
            margin-top: 18px;
            letter-spacing: 1px;
            min-height: 10px; /* Aby to neskákalo */
        }
    </style>
</head>

</html>
