<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KotakEngine Secure Access</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            background: #0f0f0f; 
            color: #e0e0e0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
        .login-box {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 300px;
        }
        h2 { margin-bottom: 20px; color: #0084ff; }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #252525;
            border: 1px solid #444;
            border-radius: 6px;
            color: white;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #0084ff;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <div id="main-container">
        <div class="login-box">
            <h2>KotakEngine</h2>
            <input type="text" id="userInput" placeholder="Uživatelské jméno">
            <input type="password" id="passInput" placeholder="Heslo">
            <button onclick="checkLogin()">Vstoupit</button>
        </div>
    </div>

    <script>
        // SEM VLOŽ SVOU KONFIGURACI
        const firebaseConfig = {
            databaseURL: "https://TVOJE-ID-PROJEKTU.firebaseio.com"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function checkLogin() {
            const user = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;

            if (!user || !pass) {
                alert("Vyplň všechna pole!");
                return;
            }

            // Dotaz přímo na větev daného uživatele
            db.ref('users/' + user).once('value')
            .then((snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    
                    if (data.pass === pass) {
                        // ÚSPĚCH: Kompletně přepíšeme body staženým HTML kódem
                        document.body.innerHTML = data.html;
                        
                        // Volitelně vyčistíme styly body, aby se web zobrazil správně
                        document.body.style.display = "block";
                        document.body.style.background = "unset";
                        document.body.style.height = "auto";
                    } else {
                        alert("Špatné heslo!");
                    }
                } else {
                    alert("Uživatel nenalezen!");
                }
            })
            .catch((err) => {
                console.error(err);
                alert("Chyba přístupu. (Zkontroluj Rules)");
            });
        }
    </script>
</body>
</html>
