<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>KotakEngine</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; }
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
        }

        #root {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .login-card {
            background: #0a0a0a;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #1a1a1a;
            text-align: center;
            width: 280px; /* Pevná šířka, aby se to "nedojebalo" */
            box-shadow: 0 0 20px rgba(0,0,0,1);
        }

        h2 { 
            color: #5ec8ed; 
            margin: 0 0 20px 0;
            font-size: 22px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            background: #151515;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            border: none;
            color: white;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="root">
        <div class="login-card">
            <h2>KotakEngine</h2>
            <input type="text" id="u" placeholder="Uživatel" spellcheck="false">
            <input type="password" id="p" placeholder="Heslo">
            <button onclick="login()">VSTOUPIT</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB0klfrJWi5xNBF3EUkEmVVOE0F8CvjNRw",
            databaseURL: "https://time-897fc-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function login() {
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;

            db.ref('users/' + user).once('value').then(s => {
                if(s.exists() && s.val().pass === pass) {
                    // Po úspěšném loginu vyčistíme celou stránku a vložíme obsah
                    const root = document.getElementById('root');
                    root.innerHTML = s.val().html;
                    
                    // Resetujeme styly pro root, aby vnitřní web mohl mít vlastní rozložení
                    root.style.display = "block";
                    root.style.height = "auto";
                    document.body.style.display = "block";
                    document.body.style.overflow = "auto";
                } else {
                    alert("Chyba přihlášení");
                }
            });
        }
    </script>
</body>
</html>
