<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>KotakEngine Terminal</title>

    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        #viewport {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100dvh;
            position: fixed;
            top: 0;
            left: 0;
        }

        .login-card {
            background: #030303;
            padding: 25px;
            border-radius: 2px;
            border: 1px solid #00ff00;
            text-align: center;
            width: 290px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            position: relative;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }

        .apply-shake {
            animation: shake 0.3s ease-in-out;
        }

        h2 { 
            color: #00ff00; 
            margin: 0 0 20px 0;
            font-size: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .input-group {
            margin-bottom: 12px;
            text-align: left;
        }

        .input-group label {
            color: #008800;
            font-size: 9px;
            display: block;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 10px;
            background: #000;
            border: 1px solid #004400;
            color: #00ff00;
            border-radius: 0;
            font-size: 14px;
            outline: none;
            font-family: 'Courier New', monospace;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #00ff00;
            border: none;
            color: black;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'Courier New', monospace;
            margin-top: 10px;
            transition: background 0.2s, filter 0.3s;
            outline: none;
        }

        button:hover:not(:disabled) {
            background: #33ff33; 
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.4);
        }

        button:disabled {
            filter: brightness(0.3);
            cursor: not-allowed;
        }

        #system-msg {
            color: #00ff00;
            font-size: 8px;
            margin-top: 18px;
            letter-spacing: 1px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div id="viewport">
        <div id="app" class="login-card">
            <h2>KOTAK_ENGINE</h2>
            <div class="input-group">
                <label>User_Identity</label>
                <input type="text" id="u" placeholder="> username" autocomplete="off" spellcheck="false">
            </div>
            <div class="input-group">
                <label>Access_Key</label>
                <input type="password" id="p" placeholder="> password">
            </div>
            <button id="login-btn" onclick="login()">Initialize_Access</button>
            <div id="system-msg"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB0klfrJWi5xNBF3EUkEmVVOE0F8CvjNRw",
            databaseURL: "https://time-897fc-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let decodeInterval;
        const decodeEffect = (text) => {
            if (decodeInterval) clearInterval(decodeInterval);
            const el = document.getElementById('system-msg');
            const target = text || "Secured by KotakEngine File Encryptor";
            const chars = "§$ABCDEF0123456789abcdeklmnorxyz!?@#%&*";
            let solved = "";
            let i = 0;
            decodeInterval = setInterval(() => {
                el.innerText = solved + chars.charAt(Math.floor(Math.random() * chars.length));
                if (Math.random() > 0.7) { solved += target[i] || ""; i++; }
                if (i >= target.length) { el.innerText = target; clearInterval(decodeInterval); }
            }, 30);
        };

        window.onload = () => decodeEffect();

        function login() {
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;
            const btn = document.getElementById('login-btn');
            const card = document.querySelector('.login-card');

            if(!user || !pass) {
                card.classList.add('apply-shake');
                setTimeout(() => card.classList.remove('apply-shake'), 300);
                return;
            }

            btn.disabled = true;
            btn.innerText = "INITIALIZING . . .";
            decodeEffect("ESTABLISHING ENCRYPTED LINK . . .");

            db.ref('users/' + user).once('value').then(s => {
                if(s.exists() && s.val().pass === pass) {
                    document.getElementById('viewport').innerHTML = s.val().html;
                } else {
                    alert("ACCESS DENIED");
                    btn.disabled = false;
                    btn.innerText = "Initialize_Access";
                    decodeEffect();
                }
            }).catch(() => {
                btn.disabled = false;
                btn.innerText = "Initialize_Access";
            });
        }
    </script>
</body>
</html>
