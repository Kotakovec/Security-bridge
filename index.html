<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>KotakEngine Secure</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: sans-serif; overflow: hidden; }

        /* LOGIN OVERLAY - To je to tvoje WebView okno */
        #login-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999; /* Vždy úplně nahoře */
            transition: opacity 0.5s ease;
        }

        .login-card {
            background: #0a0a0a;
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #1a1a1a;
            text-align: center;
            width: 280px;
            box-shadow: 0 0 30px rgba(0,0,0,1);
        }

        h2 { color: #5ec8ed; margin-bottom: 20px; font-size: 22px; }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            background: #151515;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            border: none;
            color: white;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }

        /* MÍSTO PRO OBSAH Z DATABÁZE */
        #content-wrapper {
            width: 100%;
            height: 100%;
            display: none; /* Schované, dokud se nepřihlásíš */
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h2>KotakEngine</h2>
            <input type="text" id="u" placeholder="Uživatel" spellcheck="false">
            <input type="password" id="p" placeholder="Heslo">
            <button onclick="login()">VSTOUPIT</button>
        </div>
    </div>

    <div id="content-wrapper"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB0klfrJWi5xNBF3EUkEmVVOE0F8CvjNRw",
            databaseURL: "https://time-897fc-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function login() {
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;

            db.ref('users/' + user).once('value').then(s => {
                if(s.exists() && s.val().pass === pass) {
                    
                    // 1. Vložíme web z databáze do wrapperu
                    const wrapper = document.getElementById('content-wrapper');
                    wrapper.innerHTML = s.val().html;
                    
                    // 2. Skryjeme login overlay a ukážeme obsah
                    document.getElementById('login-overlay').style.display = 'none';
                    wrapper.style.display = 'block';
                    
                    // 3. Povolíme skrolování, pokud je web dlouhý
                    document.body.style.overflow = 'auto';
                    
                } else {
                    alert("Neplatný uživatel nebo heslo");
                }
            }).catch(e => alert("Chyba databáze"));
        }
    </script>
</body>
</html>
