<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>KotakEngine Terminal</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; }
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000; /* Černočerné pozadí */
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace; /* Programátorské písmo */
        }

        #viewport {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100dvh;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* DESIGN KARTY */
        .login-card {
            background: #050505;
            padding: 30px;
            border-radius: 4px; /* Ostré, technické rohy */
            border: 1px solid #00ff00; /* Zelený rámeček */
            text-align: center;
            width: 290px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            position: relative;
        }

        /* Efekt skenování (čára jedoucí přes kartu) */
        .login-card::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(0, 255, 0, 0.1);
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        h2 { 
            color: #00ff00; 
            margin: 0 0 25px 0;
            font-size: 18px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* DESIGN INPUTŮ UVNITŘ */
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            color: #00ff00;
            font-size: 10px;
            display: block;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #004400;
            color: #00ff00;
            border-radius: 0;
            font-size: 14px;
            outline: none;
            font-family: 'Courier New', monospace;
        }

        input:focus {
            border-color: #00ff00;
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
        }

        /* DESIGN TLAČÍTKA */
        button {
            width: 100%;
            padding: 12px;
            background: #00ff00;
            border: none;
            color: black;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'Courier New', monospace;
            transition: 0.2s;
        }

        button:hover {
            background: #ffffff;
            box-shadow: 0 0 15px #ffffff;
        }

        .system-msg {
            color: #004400;
            font-size: 9px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div id="viewport">
        <div id="app" class="login-card">
            <h2>KOTAK_ENGINE</h2>
            
            <div class="input-group">
                <label>User_Identity</label>
                <input type="text" id="u" placeholder="> username" spellcheck="false" autocomplete="off">
            </div>

            <div class="input-group">
                <label>Access_Key</label>
                <input type="password" id="p" placeholder="> password">
            </div>

            <button onclick="login()">Initialize_Login</button>
            
            <div class="system-msg">SECURE_CONNECTION_ESTABLISHED</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB0klfrJWi5xNBF3EUkEmVVOE0F8CvjNRw",
            databaseURL: "https://time-897fc-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function login() {
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;

            if(!user || !pass) return;

            db.ref('users/' + user).once('value').then(s => {
                if(s.exists() && s.val().pass === pass) {
                    // Po přihlášení vložíme web z databáze
                    document.getElementById('viewport').innerHTML = s.val().html;
                } else {
                    alert("ACCESS DENIED: Invalid Identity");
                }
            });
        }
    </script>
</body>
</html>
